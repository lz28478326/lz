services:
  backend:
    build: ./backend
    container_name: monitor-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    networks:
      - monitor-net

  frontend:
    build: ./frontend
    container_name: monitor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
